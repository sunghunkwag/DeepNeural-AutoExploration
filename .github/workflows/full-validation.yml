name: Full validation

on:
  workflow_dispatch:
  pull_request:

jobs:
  full-validation:
    name: pytest and full validation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run pytest
        run: python -m pytest -q

      - name: Run EIE full validation
        env:
          EIE_FULL_JSON: ${{ runner.temp }}/eie_instrument_evolution_full_seed42.json
        run: |
          python benchmarks/eie_instrument_evolution_benchmark.py --mode full --seed 42 --output "$EIE_FULL_JSON"
          python scripts/verify_eie_smoke.py "$EIE_FULL_JSON"

      - name: Run recursive full validation
        env:
          RECURSIVE_FULL_JSON: ${{ runner.temp }}/recursive_self_improvement_full_seed42.json
        run: |
          python benchmarks/recursive_self_improvement_benchmark.py --mode full --seed 42 --output "$RECURSIVE_FULL_JSON"
          python scripts/verify_recursive_smoke.py "$RECURSIVE_FULL_JSON"

      - name: Run code-level RSI full validation
        env:
          CODE_RSI_FULL_JSON: ${{ runner.temp }}/code_level_rsi_full_seed42.json
        run: |
          python benchmarks/code_level_rsi_benchmark.py --mode full --seed 42 --output "$CODE_RSI_FULL_JSON"
          python scripts/verify_code_level_rsi_smoke.py "$CODE_RSI_FULL_JSON"

      - name: Run orchestrator full validation
        env:
          ORCH_FULL_JSON: ${{ runner.temp }}/orchestrator_integration_full_seed42.json
        run: |
          python benchmarks/orchestrator_integration_smoke.py --mode full --seed 42 --output "$ORCH_FULL_JSON"
          python scripts/verify_orchestrator_smoke.py "$ORCH_FULL_JSON"

      - name: Upload full validation outputs
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-results
          path: |
            ${{ runner.temp }}/*_full_seed42.json
            ${{ runner.temp }}/*_full_seed42.manifest.json
