name: CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    name: pytest and recursive smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run pytest
        run: python -m pytest -q

      - name: Run recursive smoke benchmark
        env:
          SMOKE_JSON: ${{ runner.temp }}/recursive_self_improvement_smoke_seed42.json
        run: |
          python benchmarks/recursive_self_improvement_benchmark.py --mode smoke --seed 42 --output "$SMOKE_JSON"
          python scripts/verify_recursive_smoke.py "$SMOKE_JSON"

      - name: Run code-level RSI smoke benchmark
        env:
          CODE_RSI_JSON: ${{ runner.temp }}/code_level_rsi_smoke_seed42.json
        run: |
          python benchmarks/code_level_rsi_benchmark.py --mode smoke --seed 42 --output "$CODE_RSI_JSON"
          python scripts/verify_code_level_rsi_smoke.py "$CODE_RSI_JSON"

      - name: Upload recursive smoke outputs
        uses: actions/upload-artifact@v4
        with:
          name: recursive-smoke-results
          path: |
            ${{ runner.temp }}/recursive_self_improvement_smoke_seed42.json
            ${{ runner.temp }}/recursive_self_improvement_smoke_seed42.manifest.json
            ${{ runner.temp }}/code_level_rsi_smoke_seed42.json
            ${{ runner.temp }}/code_level_rsi_smoke_seed42.manifest.json
